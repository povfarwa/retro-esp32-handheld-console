[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps = bodmer/TFT_eSPI @ ^2.5.43

build_flags =
-D USER_SETUP_LOADED=1
-D ILI9488_DRIVER=1
-D TFT_BL=45
-D TFT_MISO=13
-D TFT_MOSI=11
-D TFT_SCKL=12
-D TFT_CS=10
-D TFT_DC=14
-D TFT_RST=15
-D TFT_GLCD=1
-D LOAD_FONT2=1
-D SPI_FREQUENCY=27000000
